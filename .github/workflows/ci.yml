name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node (if needed)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
        
      - name: Run tests
        run: npm test  # Replace with your actual test command
        
      # For demo: intentional failure
      - name: Demo failure
        run: exit 1
```

### 3. Create PR with Correct Branch

1. **Create task:** HAM-1 (already exists)
2. **Create branch:** `feature/HAM-1-checkout-refactor`
3. **Push code**
4. **Open PR**
5. **CI will run** and fail (because of `exit 1`)
6. **Your system will block task HAM-1** automatically

